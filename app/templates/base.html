<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Consumer360{% endblock %}</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap");

        :root {
            --bg-start: #382f89;
            --bg-end: #4c1d95;
            --surface: #ffffff;
            --surface-soft: #f8f9ff;
            --text-primary: #101828;
            --text-muted: #667085;
            --accent: #7c3aed;
            --accent-2: #3b82f6;
            --border: #e4e7ec;
            --shadow: 0 18px 45px rgba(17, 24, 39, 0.15);
            --shadow-soft: 0 10px 22px rgba(17, 24, 39, 0.08);
            --radius-lg: 18px;
            --radius-md: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: "Manrope", "Segoe UI", sans-serif;
            color: var(--text-primary);
            background:
                radial-gradient(circle at 15% 20%, rgba(99, 102, 241, 0.33), transparent 35%),
                radial-gradient(circle at 85% 15%, rgba(59, 130, 246, 0.24), transparent 30%),
                linear-gradient(145deg, var(--bg-start), var(--bg-end));
            min-height: 100vh;
            letter-spacing: 0.01em;
            opacity: 1;
            transition: opacity 0.32s ease;
        }

        body.is-leaving {
            opacity: 0;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(12px);
            background: rgba(30, 27, 75, 0.52);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1260px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
        }

        nav h1 {
            color: #ffffff;
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: 0.02em;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 0.45rem;
            flex-wrap: wrap;
        }

        nav a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            padding: 0.52rem 0.85rem;
            border-radius: 999px;
            transition: background-color 0.2s ease, transform 0.2s ease, color 0.2s ease;
        }

        nav a:hover,
        nav a.active {
            background: rgba(255, 255, 255, 0.16);
            color: #ffffff;
            transform: translateY(-1px);
        }

        main {
            max-width: 1260px;
            margin: 0 auto;
            padding: 2rem 1.5rem 2.4rem;
        }

        .container {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(251, 252, 255, 0.96));
            border-radius: var(--radius-lg);
            padding: 1.8rem;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.72);
            animation: fadeUp 0.55s ease both;
        }

        h2 {
            color: #111827;
            margin-bottom: 0.6rem;
            font-size: clamp(1.5rem, 2.8vw, 2rem);
            font-weight: 800;
        }

        h3 {
            color: #1f2937;
            font-size: 1.05rem;
            margin-bottom: 0.9rem;
        }

        p {
            color: var(--text-muted);
            line-height: 1.65;
        }

        .section {
            margin-top: 1.5rem;
            padding-top: 1rem;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 0.8rem;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-soft);
            padding: 1rem;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            animation: fadeUp 0.52s ease both;
        }

        .panel:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 30px rgba(17, 24, 39, 0.12);
        }

        .chart-image {
            width: 100%;
            border-radius: 12px;
            border: 1px solid #eaecf0;
            background: #fff;
            display: block;
        }

        .empty-state {
            padding: 1rem;
            border: 1px dashed #c7d2fe;
            border-radius: 12px;
            background: linear-gradient(135deg, #f7f6ff, #eef4ff);
            color: #4b5563;
            font-size: 0.95rem;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 1rem;
        }

        .filter-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.9rem;
            box-shadow: var(--shadow-soft);
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0.75rem;
        }

        .filter-field {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            color: #4b5563;
            font-size: 0.82rem;
            font-weight: 600;
        }

        .filter-field input,
        .filter-field select {
            border: 1px solid #d0d5dd;
            border-radius: 10px;
            padding: 0.58rem 0.65rem;
            font-family: inherit;
            font-size: 0.92rem;
            color: #111827;
            background: #fff;
        }

        .filter-field input:focus,
        .filter-field select:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
        }

        .filter-actions {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-top: 0.75rem;
        }

        .btn-primary,
        .btn-secondary {
            text-decoration: none;
            border: 1px solid transparent;
            border-radius: 10px;
            padding: 0.56rem 0.95rem;
            font-weight: 700;
            font-size: 0.86rem;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            color: #fff;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.25);
        }

        .btn-secondary {
            background: #fff;
            color: #334155;
            border-color: #d0d5dd;
        }

        .kpi-card {
            background: linear-gradient(132deg, var(--accent), var(--accent-2));
            color: #ffffff;
            padding: 1rem 1.1rem;
            border-radius: 14px;
            box-shadow: 0 14px 24px rgba(79, 70, 229, 0.25);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeUp 0.5s ease both;
        }

        .kpi-card:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 22px 36px rgba(79, 70, 229, 0.32);
        }

        .kpi-label {
            font-size: 0.82rem;
            opacity: 0.9;
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .kpi-value {
            font-size: clamp(1.35rem, 2.5vw, 2rem);
            font-weight: 800;
            line-height: 1.2;
        }

        .split-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
            margin-top: 0.9rem;
        }

        .segment-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .segment-card {
            background: var(--surface-soft);
            border-radius: 12px;
            border: 1px solid #e9e9fb;
            padding: 0.85rem;
            transition: transform 0.22s ease, box-shadow 0.22s ease;
            animation: fadeUp 0.52s ease both;
        }

        .segment-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(30, 41, 59, 0.11);
        }

        .segment-name {
            font-size: 0.85rem;
            color: #6b7280;
            margin-bottom: 0.3rem;
        }

        .segment-value {
            font-size: 1.2rem;
            font-weight: 800;
            color: #111827;
        }

        .divider {
            border: 0;
            border-top: 1px solid #eaecf0;
            margin: 1.2rem 0;
        }

        .section {
            animation: fadeUp 0.6s ease both;
        }

        .section:nth-of-type(2) {
            animation-delay: 0.07s;
        }

        .section:nth-of-type(3) {
            animation-delay: 0.12s;
        }

        .section:nth-of-type(4) {
            animation-delay: 0.16s;
        }

        .section:nth-of-type(5) {
            animation-delay: 0.2s;
        }

        .page-loader {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            background: rgba(15, 23, 42, 0.78);
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.35s ease, visibility 0.35s ease;
        }

        .page-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-ring {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.22);
            border-top-color: #ffffff;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 980px) {
            .kpi-grid,
            .split-grid,
            .segment-grid,
            .filter-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            nav {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.7rem;
            }
        }

        @media (max-width: 640px) {
            main {
                padding: 1.2rem 0.9rem 1.7rem;
            }

            .container {
                padding: 1rem;
                border-radius: 14px;
            }

            .kpi-grid,
            .split-grid,
            .segment-grid,
            .filter-grid {
                grid-template-columns: 1fr;
            }

            nav ul {
                width: 100%;
            }

            nav a {
                display: inline-flex;
                width: 100%;
                justify-content: center;
            }
        }
    </style>
    {% block extra_style %}{% endblock %}
</head>
<body>
    <div class="page-loader" id="pageLoader" aria-hidden="true">
        <div class="loader-ring"></div>
    </div>
    <header>
        <nav>
            <h1>Consumer360</h1>
            <ul>
                <li><a href="/" {% if request.path == '/' %}class="active"{% endif %}>Dashboard</a></li>
                <li><a href="/segments" {% if request.path == '/segments' %}class="active"{% endif %}>Segments</a></li>
                <li><a href="/sales" {% if request.path == '/sales' %}class="active"{% endif %}>Sales</a></li>
                <li><a href="/cohort" {% if request.path == '/cohort' %}class="active"{% endif %}>Cohort</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script>
        window.addEventListener("load", function () {
            const loader = document.getElementById("pageLoader");
            if (loader) {
                loader.classList.add("hidden");
            }
        });

        document.querySelectorAll("a[href]").forEach(function (link) {
            const href = link.getAttribute("href");
            if (!href || href.startsWith("#") || href.startsWith("javascript:")) {
                return;
            }

            link.addEventListener("click", function (event) {
                const isSameOrigin = link.origin === window.location.origin;
                if (!isSameOrigin || link.target === "_blank") {
                    return;
                }

                event.preventDefault();
                document.body.classList.add("is-leaving");
                setTimeout(function () {
                    window.location.href = href;
                }, 220);
            });
        });
    </script>
</body>
</html>
